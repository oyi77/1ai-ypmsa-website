<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terima Kasih — Donasi YPSMA Berhasil</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green: #10b981;
      --green-d: #059669;
      --green-l: #d1fae5;
      --amber: #f59e0b;
      --bg: #f8fafc;
      --text: #1e293b;
      --text-2: #475569;
      --text-3: #94a3b8;
      --white: #ffffff;
      --radius: 16px;
      --sans: 'Inter', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    /* Success animation */
    .check-wrap {
      width: 80px;
      height: 80px;
      background: var(--green-l);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: pop .4s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .check-wrap svg { animation: draw .5s .3s ease both; stroke-dasharray: 50; stroke-dashoffset: 50; }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    .status-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .badge-success { background: var(--green-l); color: var(--green-d); }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-error   { background: #fee2e2; color: #991b1b; }

    h1 { font-size: 1.75rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .subtitle { color: var(--text-2); font-size: 1rem; line-height: 1.6; margin-bottom: 28px; }

    .info-box {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 28px;
      text-align: left;
    }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 0.9rem; }
    .info-row:not(:last-child) { border-bottom: 1px solid #e2e8f0; }
    .info-label { color: var(--text-3); font-weight: 500; }
    .info-value { color: var(--text); font-weight: 600; }
    .info-value.green { color: var(--green-d); }

    .btn-wa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      background: #25D366;
      color: #fff;
      font-weight: 700;
      font-size: 1.05rem;
      border-radius: 12px;
      text-decoration: none;
      transition: background .2s, transform .15s;
      margin-bottom: 12px;
    }
    .btn-wa:hover { background: #128C7E; transform: translateY(-1px); }
    .btn-wa svg { flex-shrink: 0; }

    .btn-home {
      display: block;
      width: 100%;
      padding: 12px 24px;
      background: transparent;
      color: var(--text-2);
      font-weight: 600;
      font-size: 0.9rem;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .btn-home:hover { border-color: var(--green); color: var(--green-d); }

    .countdown {
      font-size: 0.8rem;
      color: var(--text-3);
      margin-top: 16px;
    }
    .countdown span { font-weight: 700; color: var(--text-2); }

    /* Pending state */
    .pending-note {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.875rem;
      color: #78350f;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
      h1 { font-size: 1.5rem; }
    }
  </style>

<body>
  <div class="card" id="card">
    <!-- Content injected by JS based on status param -->
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const status   = params.get('status')   || 'success';
      const orderId  = params.get('order')    || '-';
      const campaign = params.get('campaign') || 'Donasi YPSMA';
      const amount   = parseInt(params.get('amount') || '0', 10);
      const waUrl    = params.get('wa')       || 'https://wa.me/6282234551160';

      const fmt = (n) => 'Rp ' + n.toLocaleString('id-ID');
      const card = document.getElementById('card');

      function renderSuccess() {
        card.innerHTML = `
          <div class="check-wrap">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none"
                 stroke="#10b981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="8,21 16,29 32,13"/>
            </svg>
          </div>
          <span class="status-badge badge-success">✓ Pembayaran Berhasil</span>
          <h1>Jazakallahu Khairan 🤲</h1>
          <p class="subtitle">
            Donasi Anda telah diterima. Semoga menjadi amal jariyah yang terus mengalir.
          </p>
          <div class="info-box">
            <div class="info-row">
              <span class="info-label">Program</span>
              <span class="info-value">${escHtml(campaign)}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Nominal</span>
              <span class="info-value green">${fmt(amount)}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Order ID</span>
              <span class="info-value" style="font-size:.8rem;font-family:monospace">${escHtml(orderId)}</span>
            </div>
          </div>
          <a href="${escHtml(waUrl)}" id="wa-btn" class="btn-wa" target="_blank" rel="noopener">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.52 3.48A11.93 11.93 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.12.55 4.18 1.6 5.99L0 24l6.18-1.57A11.94 11.94 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.21-1.25-6.22-3.48-8.52zM12 22c-1.85 0-3.66-.5-5.23-1.44l-.37-.22-3.87.98.99-3.76-.24-.39A9.95 9.95 0 0 1 2 12C2 6.48 6.48 2 12 2c2.67 0 5.19 1.04 7.07 2.93A9.93 9.93 0 0 1 22 12c0 5.52-4.48 10-10 10zm5.47-7.4c-.3-.15-1.77-.87-2.04-.97-.28-.1-.48-.15-.68.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.64.07-.3-.15-1.25-.46-2.38-1.47-.88-.78-1.47-1.75-1.64-2.04-.17-.3-.02-.46.13-.6.13-.13.3-.35.44-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.68-1.63-.93-2.23-.24-.58-.49-.5-.68-.51H7.5c-.2 0-.52.07-.79.37-.27.3-1.04 1.01-1.04 2.47s1.06 2.87 1.21 3.07c.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.7.63.71.22 1.36.19 1.87.12.57-.09 1.77-.72 2.01-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.35z"/>
            </svg>
            Konfirmasi via WhatsApp
          </a>
          <a href="/" class="btn-home">← Kembali ke Beranda</a>
          <p class="countdown">Otomatis redirect ke WA dalam <span id="sec">5</span> detik…</p>
        `;
        // Countdown redirect
        let s = 5;
        const el = document.getElementById('sec');
        const waBtn = document.getElementById('wa-btn');
        const iv = setInterval(function () {
          s--;
          if (el) el.textContent = s;
          if (s <= 0) {
            clearInterval(iv);
            window.location.href = waUrl;
          }
        }, 1000);
        // If user clicks WA manually, cancel timer
        if (waBtn) waBtn.addEventListener('click', function () { clearInterval(iv); });
      }

      function renderPending() {
        card.innerHTML = `
          <div style="font-size:3rem;margin-bottom:16px">⏳</div>
          <span class="status-badge badge-pending">Menunggu Pembayaran</span>
          <h1>Pembayaran Pending</h1>
          <p class="subtitle">Selesaikan pembayaran Anda. Donasi akan dikonfirmasi otomatis setelah transfer berhasil.</p>
          <div class="pending-note">
            💡 Jika sudah bayar tapi masih pending, tunggu 1–5 menit lalu hubungi admin via WhatsApp.
          </div>
          <div class="info-box">
            <div class="info-row">
              <span class="info-label">Program</span>
              <span class="info-value">${escHtml(campaign)}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Nominal</span>
              <span class="info-value">${fmt(amount)}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Order ID</span>
              <span class="info-value" style="font-size:.8rem;font-family:monospace">${escHtml(orderId)}</span>
            </div>
          </div>
          <a href="${escHtml(waUrl)}" class="btn-wa" target="_blank" rel="noopener">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.52 3.48A11.93 11.93 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.12.55 4.18 1.6 5.99L0 24l6.18-1.57A11.94 11.94 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.21-1.25-6.22-3.48-8.52zM12 22c-1.85 0-3.66-.5-5.23-1.44l-.37-.22-3.87.98.99-3.76-.24-.39A9.95 9.95 0 0 1 2 12C2 6.48 6.48 2 12 2c2.67 0 5.19 1.04 7.07 2.93A9.93 9.93 0 0 1 22 12c0 5.52-4.48 10-10 10zm5.47-7.4c-.3-.15-1.77-.87-2.04-.97-.28-.1-.48-.15-.68.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.64.07-.3-.15-1.25-.46-2.38-1.47-.88-.78-1.47-1.75-1.64-2.04-.17-.3-.02-.46.13-.6.13-.13.3-.35.44-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.68-1.63-.93-2.23-.24-.58-.49-.5-.68-.51H7.5c-.2 0-.52.07-.79.37-.27.3-1.04 1.01-1.04 2.47s1.06 2.87 1.21 3.07c.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.7.63.71.22 1.36.19 1.87.12.57-.09 1.77-.72 2.01-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.35z"/>
            </svg>
            Konfirmasi via WhatsApp
          </a>
          <a href="/" class="btn-home">← Kembali ke Beranda</a>
        `;
      }

      function renderError() {
        card.innerHTML = `
          <div style="font-size:3rem;margin-bottom:16px">❌</div>
          <span class="status-badge badge-error">Pembayaran Gagal</span>
          <h1>Gagal Memproses Donasi</h1>
          <p class="subtitle">Terjadi kesalahan saat memproses pembayaran. Tidak ada dana yang dipotong.</p>
          <div class="info-box">
            <div class="info-row">
              <span class="info-label">Program</span>
              <span class="info-value">${escHtml(campaign)}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Nominal</span>
              <span class="info-value">${fmt(amount)}</span>
            </div>
          </div>
          <a href="${escHtml(waUrl)}" class="btn-wa" target="_blank" rel="noopener">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.52 3.48A11.93 11.93 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.12.55 4.18 1.6 5.99L0 24l6.18-1.57A11.94 11.94 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.21-1.25-6.22-3.48-8.52zM12 22c-1.85 0-3.66-.5-5.23-1.44l-.37-.22-3.87.98.99-3.76-.24-.39A9.95 9.95 0 0 1 2 12C2 6.48 6.48 2 12 2c2.67 0 5.19 1.04 7.07 2.93A9.93 9.93 0 0 1 22 12c0 5.52-4.48 10-10 10zm5.47-7.4c-.3-.15-1.77-.87-2.04-.97-.28-.1-.48-.15-.68.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.64.07-.3-.15-1.25-.46-2.38-1.47-.88-.78-1.47-1.75-1.64-2.04-.17-.3-.02-.46.13-.6.13-.13.3-.35.44-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.68-1.63-.93-2.23-.24-.58-.49-.5-.68-.51H7.5c-.2 0-.52.07-.79.37-.27.3-1.04 1.01-1.04 2.47s1.06 2.87 1.21 3.07c.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.7.63.71.22 1.36.19 1.87.12.57-.09 1.77-.72 2.01-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.35z"/>
            </svg>
            Hubungi Admin WhatsApp
          </a>
          <a href="javascript:history.back()" class="btn-home">← Coba Lagi</a>
        `;
      }

      function escHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }


      // === Conversion Tracking ===
      if (status === 'success') {
        // GA4 Purchase event
        if (typeof gtag !== 'undefined') {
          gtag('event', 'purchase', {
            transaction_id: orderId,
            value: amount / 1000,  // in thousands (IDR)
            currency: 'IDR',
            items: [{ item_name: campaign, item_category: 'Donasi', quantity: 1, price: amount / 1000 }]
          });
          gtag('event', 'donate_complete', {
            campaign: campaign,
            amount: amount,
            order_id: orderId
          });
        }
        // Meta Pixel Purchase event
        if (typeof fbq !== 'undefined') {
          fbq('track', 'Purchase', {
            value: amount / 1000,
            currency: 'IDR',
            content_name: campaign,
            content_type: 'donasi'
          });
        }
      }

      if (status === 'pending') renderPending();
      else if (status === 'error') renderError();
      else renderSuccess();
    })();
  </script>
</body>
</html>
